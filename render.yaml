# Render Blueprint
# https://render.com/docs/blueprint-yaml

services:
  - type: web
    name: btc-monitor-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python dashboard_web.py
    envVars:
      - key: PORT
        value: 8080
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false